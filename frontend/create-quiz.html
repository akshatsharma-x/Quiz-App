<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Native Quiz Builder | QuizMUJ</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f4f4f9;
            margin: 0; padding: 20px;
            color: #333;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to right, #e65100, #ff7900);
            color: white; padding: 1rem 2rem; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(230, 81, 0, 0.2);
        }
        .header a { color: white; text-decoration: none; font-weight: bold; }
        
        .builder-container {
            max-width: 900px; margin: 30px auto;
        }
        .glass-panel {
            background: white; border-radius: 16px; padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 20px; border-top: 5px solid #ff7900;
        }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #555; }
        input[type="text"], input[type="number"], textarea, select {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1rem;
            box-sizing: border-box; transition: border 0.3s;
        }
        input:focus, textarea:focus { border-color: #ff7900; outline: none; }
        
        .question-block {
            background: #fdfdfd; border: 1px solid #eee; padding: 20px;
            border-radius: 12px; margin-bottom: 20px; position: relative;
            transition: transform 0.3s;
        }
        .question-block:hover { transform: translateX(5px); border-left: 4px solid #ff7900; }
        
        .remove-btn {
            position: absolute; top: 15px; right: 15px;
            background: #ff4757; color: white; border: none;
            padding: 5px 10px; border-radius: 6px; cursor: pointer;
        }
        
        .options-container { margin-left: 20px; border-left: 2px dashed #ddd; padding-left: 15px; }
        .option-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .btn {
            background: #ff7900; color: white; border: none; padding: 10px 20px;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: #e65100; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(230,81,0,0.3); }
        .btn-outline {
            background: transparent; color: #ff7900; border: 2px solid #ff7900;
        }
        .btn-outline:hover { background: #fff3e0; }

        pre { background: #2d3436; color: #00cec9; padding: 15px; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🛠 Native Quiz Builder</h2>
        <a href="admin.html">← Back to Dashboard</a>
    </div>

    <div class="builder-container">
        <!-- Step 1: Quiz Metadata -->
        <div class="glass-panel">
            <h3>1. Quiz Settings</h3>
            <div class="form-group">
                <label>Quiz Title</label>
                <input type="text" id="quizTitle" placeholder="e.g., Database Management Midterm" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="quizDesc" rows="3" placeholder="Instructions for the students..."></textarea>
            </div>
            <div style="display: flex; gap: 20px;">
                <div class="form-group" style="flex: 1;">
                    <label>Time Limit (Minutes)</label>
                    <input type="number" id="timeLimit" value="30" min="1">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Target Cohort / Batch</label>
                    <input type="text" id="cohort" placeholder="e.g., CS-Semester-4 or All" value="All">
                </div>
            </div>
        </div>

        <!-- Step 2: The Question Bank Injector -->
        <div class="glass-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>2. Question Repository</h3>
                <button class="btn btn-outline" onclick="addQuestionBlock()">+ Add Question</button>
            </div>
            
            <div id="questionsWrapper">
                <!-- Dynamic questions injected here -->
            </div>
        </div>

        <div style="text-align: right; margin-bottom: 50px;">
            <button class="btn" style="font-size: 1.2rem; padding: 15px 40px;" onclick="generateJSON()">Upload Quiz to Database 🚀</button>
        </div>

        <!-- For demonstration bounds, showing the extracted JSON -->
        <div class="glass-panel" id="debugPanel" style="display: none;">
            <h3>Generated API Payload</h3>
            <p>This strict JSON object perfectly maps to your Express backend Mongoose schemas.</p>
            <pre id="jsonOutput"></pre>
        </div>
    </div>

    <script src="create-quiz.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>External Quiz Wrapper | QuizMUJ</title>
    <link rel="stylesheet" href="student-dashboard.css">
    <style>
        .iframe-container {
            width: 100%;
            height: calc(100vh - 120px); /* Fill screen minus header space */
            border: 2px solid var(--primary-orange);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--glass-shadow);
        }
        
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff; /* Google Forms usually expect a light background */
        }

        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .primary-btn.danger {
            background-color: var(--danger-color);
        }

        .primary-btn.danger:hover {
            opacity: 0.8;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }
    </style>
</head>
<body class="dark-mode" style="padding: 2rem;">

    <div class="header-controls">
        <h2 id="quizTitleDisplay" style="color: var(--primary-orange)">Loading Quiz...</h2>
        <button class="primary-btn danger" onclick="markExternalCompleted()">Mark as Completed & Return</button>
    </div>

    <!-- The Wrapping Gateway -->
    <div class="iframe-container glass">
        <iframe id="googleFormIframe" src=""></iframe>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const quizId = urlParams.get('quizId');
            const token = localStorage.getItem('quizmuj_token');

            if (!quizId || !token) {
                alert("Unauthorized or Missing Quiz Data.");
                window.location.href = 'student-dashboard.html';
                return;
            }

            try {
                // Fetch the exact Google Form URL from the backend
                const res = await fetch(`http://localhost:5001/api/v1/quizzes/${quizId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.success && data.data.type === 'google_form') {
                    document.getElementById('quizTitleDisplay').textContent = data.data.title;
                    document.getElementById('googleFormIframe').src = data.data.googleFormUrl || 'about:blank';
                } else {
                    alert('Failed to load external quiz structure.');
                }
            } catch (err) {
                console.error(err);
                alert("Network Disconnected.");
            }
        });

        function markExternalCompleted() {
            if(confirm("Have you successfully submitted the Google Form? Continuing will return you to the dashboard.")) {
                window.location.href = 'student-dashboard.html';
            }
        }
    </script>
</body>
</html>

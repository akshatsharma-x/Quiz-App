<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | QuizMUJ</title>
    <style>
        /* Base Setup */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Updated to Brand Orange #ff7900 */
            background: linear-gradient(135deg, #ff7900 0%, #ff5500 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Brand Title */
        .brand-title {
            font-size: 3rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            animation: fadeInDown 1s ease-out;
        }

        /* Main Card Container */
        .register-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 350px;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s ease-out forwards 0.3s;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 1.2rem;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Dynamic Input Fields */
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            /* Updated Focus Color */
            border-color: #ff7900;
            outline: none;
            box-shadow: 0 0 8px rgba(255, 121, 0, 0.3);
        }

        /* The Button */
        button {
            width: 100%;
            padding: 12px;
            /* Updated Button Gradient */
            background: linear-gradient(to right, #ff7900, #ff9100);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            /* Updated Shadow Color */
            box-shadow: 0 5px 15px rgba(255, 121, 0, 0.4);
        }

        /* Error Message Specific to Register */
        .error-msg {
            color: #d94347;
            /* Kept red for error visibility */
            font-size: 0.8rem;
            display: none;
            margin-top: 5px;
            font-weight: 600;
        }

        /* Footer Links */
        .footer-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #666;
        }

        .footer-link a {
            /* Updated Link Color */
            color: #ff7900;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .footer-link a:hover {
            color: #e66a00;
            text-decoration: underline;
        }

        /* Animations */
        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="brand-title">QuizMUJ</div>

    <div class="register-container">
        <h2 id="formTitle">Create Account</h2>
        <form id="registerForm">
            <!-- Initial Registration Fields -->
            <div id="registrationFields">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">University Email</label>
                    <input type="email" id="email" placeholder="user@muj.manipal.edu"
                        pattern="^[a-zA-Z0-9.\_%+-]+@muj\.manipal\.edu$" title="Must be a valid @muj.manipal.edu email"
                        required>
                    <span id="emailError" class="error-msg">Registration is limited to @muj.manipal.edu</span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Min. 6 characters" required>
                    <span id="passError" class="error-msg">Password must be at least 6 characters.</span>
                </div>
            </div>

            <!-- OTP Verification Field (Hidden initially) -->
            <div id="otpGroup" class="form-group" style="display: none;">
                <label for="otp">Enter 6-Digit OTP sent to your email</label>
                <input type="text" id="otp" placeholder="123456" maxlength="6" pattern="\d{6}">
            </div>

            <button type="submit" id="mainSubmitBtn">Sign Up</button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5001/api/v1';
        let currentMode = 'register'; // 'register' | 'verifyOtp'

        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const nameInput = document.getElementById('name').value;
            const emailInput = document.getElementById('email').value;
            const passwordInput = document.getElementById('password').value;
            const otpInput = document.getElementById('otp').value;
            const btn = document.getElementById('mainSubmitBtn');
            const errorSpan = document.getElementById('passError');

            // Reset Errors
            errorSpan.style.display = 'none';
            document.getElementById('emailError').style.display = 'none';
            document.getElementById('password').style.borderColor = '#eee';
            document.getElementById('email').style.borderColor = '#eee';

            // Validate Registration mode
            if (currentMode === 'register') {
                const domainRegex = /^[a-zA-Z0-9.\_%+-]+@muj\.manipal\.edu$/;
                if (!domainRegex.test(emailInput)) {
                    document.getElementById('emailError').style.display = 'block';
                    document.getElementById('email').style.borderColor = '#d94347';
                    return;
                }
                if (passwordInput.length < 6) {
                    errorSpan.style.display = 'block';
                    document.getElementById('password').style.borderColor = '#d94347';
                    return;
                }
            }

            const originalText = btn.innerText;
            btn.disabled = true;
            btn.style.opacity = "0.8";

            try {
                if (currentMode === 'register') {
                    btn.innerText = "Creating Account & Sending OTP...";
                    const res = await fetch(`${API_BASE}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: nameInput,
                            email: emailInput,
                            password: passwordInput,
                            role: 'user' // Default to user, admin logic separate
                        })
                    });
                    const data = await res.json();

                    if (!res.ok) throw new Error(data.error || 'Registration failed');

                    // UI Switch to OTP mode
                    currentMode = 'verifyOtp';
                    document.getElementById('registrationFields').style.display = 'none';
                    document.getElementById('name').required = false;
                    document.getElementById('email').required = false;
                    document.getElementById('password').required = false;

                    document.getElementById('formTitle').innerText = "Verify Email";
                    document.getElementById('otpGroup').style.display = 'block';
                    document.getElementById('otp').required = true;
                    btn.innerText = "Verify OTP";

                    alert("Account created! Please check your email for the verification OTP.");

                } else if (currentMode === 'verifyOtp') {
                    btn.innerText = "Verifying...";
                    const res = await fetch(`${API_BASE}/auth/verify-otp`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: emailInput, otp: otpInput })
                    });
                    const data = await res.json();

                    if (!res.ok) throw new Error(data.error || 'Invalid OTP');

                    // On success, save token and redirect
                    localStorage.setItem('quizmuj_token', data.token);
                    alert("Email Verified! Redirecting to dashboard...");
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                alert(err.message);
            } finally {
                if (currentMode === 'register') btn.innerText = originalText;
                if (currentMode === 'verifyOtp' && !btn.disabled) btn.innerText = "Verify OTP";
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        });
    </script>
</body>

</html>

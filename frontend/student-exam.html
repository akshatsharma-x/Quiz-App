<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Mode | QuizMUJ Exam</title>
    <!-- Socket.io -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="student-exam.css">
</head>
<body class="dark-mode focus-mode-active">

    <!-- Anti-Cheat Warning Modal -->
    <div id="cheatModal" class="modal-overlay">
        <div class="modal-content glass warning-glow">
            <div class="modal-icon">🚨</div>
            <h2>Focus Lost!</h2>
            <p>Your action has been recorded. Switching tabs is strictly prohibited.</p>
            <button id="acknowledgeWarningBtn" class="primary-btn">I Understand</button>
        </div>
    </div>

    <!-- Exam Header -->
    <header class="exam-header glass">
        <div class="header-left">
            <h1 id="quizTitle">Advanced Data Structures - Midterm</h1>
        </div>
        <div class="header-center">
            <div class="timer-display" id="examTimer">60:00</div>
        </div>
        <div class="header-right">
            <button id="finalSubmitBtn" class="primary-btn pulse-submit">Submit Exam</button>
        </div>
    </header>

    <main class="exam-layout">
        <!-- Question Area -->
        <section class="question-section glass">
            <div class="question-header">
                <span class="question-number" id="qNumberDisplay">Question 1 of 5</span>
                <button id="markReviewBtn" class="secondary-btn">⭐ Mark for Review</button>
            </div>
            
            <div class="question-content" id="qText">
                <!-- Populated by JS -->
                Loading question...
            </div>

            <div class="options-container" id="optionsContainer">
                <!-- Populated by JS -->
            </div>

            <div class="navigation-buttons">
                <button id="prevBtn" class="secondary-btn" disabled>← Previous</button>
                <span class="save-status" id="saveStatus">Saved</span>
                <button id="nextBtn" class="primary-btn">Next →</button>
            </div>
        </section>

        <!-- Sidebar / Question Grid -->
        <aside class="exam-sidebar glass">
            <h3>Question Palette</h3>
            <div class="grid-legend">
                <div class="legend-item"><span class="dot answered"></span> Answered</div>
                <div class="legend-item"><span class="dot unanswered"></span> Unanswered</div>
                <div class="legend-item"><span class="dot review"></span> Review</div>
            </div>
            <div class="question-grid" id="questionGrid">
                <!-- Populated by JS -->
            </div>
        </aside>
    </main>

    <script src="student-exam.js"></script>
</body>
</html>
